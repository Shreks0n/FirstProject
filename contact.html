<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Group Company</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/ce6dd52fa4.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./css/contact.css">
</head>

<body>

    <button class="burger-btn">
        <div class="burger-btn__box">
            <div class="burger-btn__bars"></div>
        </div>
    </button>

    <nav class="nav nav-mobile">
        <a href="index.html" class="nav__item">Home</a>
        <a href="offers.html" class="nav__item">Offers</a>
        <a href="contact.html" class="nav__item">Contact</a>
    </nav>
    <nav class="nav nav-desktop">
        <div class="nav__logo"><a href="#home" class="nav__logo"><i class="fa-solid fa-tree"></i> Forest</a></div>
        <div class="nav__items">
            <a href="index.html" class="nav__item">Home</a>
            <a href="offers.html" class="nav__item">Offers</a>
            <a href="contact.html" class="nav__item">Contact</a>
        </div>
    </nav>
    <main class="main">
        <section class="contact section white-section section-padding" id="contact">
            <h2 class="section-heading">Contact us!</h2>
            <div class="wrapper">
                <form class="contact__form">
                    <div class="contact__form-top">
                        <label for="name" class="contact__form-label">Full Name:</label>
                        <input type="text" class="contact__form-input" id="name">

                        <label for="email" class="contact__form-label">E-mail:</label>
                        <input type="text" class="contact__form-input" id="email">
                    </div>

                    <label for="msg" class="contact__form-label">Message:</label>
                    <textarea id="msg" class="contact__form-textarea"></textarea>
                    <button type="submit" class="contact__form-btn">Send</button>
                </form>
            </div>
            <div class="contact__map">
                <h3 class="contact__map-title">You can visit us here!</h3>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d38850.4538800983!2d13.341265757200532!3d52.51256348321655!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47a851ffa7566493%3A0x58705947299a8b1a!2zUsO8eWFtIEdlbcO8c2UgS2ViYWI!5e0!3m2!1spl!2sde!4v1776806786187!5m2!1spl!2sde" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>


        </section>
    </main>

<footer class="footer" id="contact">
        <div class="wrapper">
            <div class="footer__boxes">

                <div class="footer__box">
                    <h3 class="footer__box-logo"><i class="fa-solid fa-tree"></i> Forest</h3>
                    <div class="footer__box-social">
                        <a href="#" class="footer__box-link"><i class="fa-brands fa-square-x-twitter"></i></a>
                        <a href="#" class="footer__box-link"><i class="fa-brands fa-youtube"></i></a>
                        <a href="#" class="footer__box-link"><i class="fa-brands fa-square-instagram"></i></a>
                    </div>
                </div>

                <div class="footer__box footer__box-desktop">
                    <h3 class="footer__box-title">About us</h3>
                    <ul class="footer__box-list">
                        <li class="footer__box-list-item"><a href="#">Our story</a></li>
                        <li class="footer__box-list-item"><a href="#">Parks</a></li>
                        <li class="footer__box-list-item"><a href="#">Reviews</a></li>
                    </ul>
                </div>
                <div class="footer__box footer__box-desktop">
                    <h3 class="footer__box-title">Our Company</h3>
                    <ul class="footer__box-list">
                        <li class="footer__box-list-item"><a href="#">Careers</a></li>
                        <li class="footer__box-list-item"><a href="#">HR</a></li>
                        <li class="footer__box-list-item"><a href="#">Managment</a></li>
                    </ul>
                </div>
                <div class="footer__box footer__box-desktop">
                    <h3 class="footer__box-title">Documents</h3>
                    <ul class="footer__box-list">
                        <li class="footer__box-list-item"><a href="#">Forms</a></li>
                        <li class="footer__box-list-item"><a href="#">Bookings</a></li>
                    </ul>
                </div>

            </div>
        </div>
        <hr>
        <p class="footer__bottom-text"> &copy; <span class="footer_year"></span> Forest Group Company Ltd.</p>
    </footer>
    <script src="js/script.js"></script>

</body>

</html>
